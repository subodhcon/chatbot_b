# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string_format is passed to datetime.strftime.
# timezone = UTC

# max length of characters to include in filename
# slug_length = 40

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, initial runs must specify the version path
# in the version_locations setting.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version_path_separator = :

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# prepend_sys_path = false

# location of line length limit configuration for black or autopep8
# formatter_config_path = %(here)s/pyproject.toml

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
